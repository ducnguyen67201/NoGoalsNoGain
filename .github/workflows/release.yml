name: Release desktop app

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

jobs:
  publish:
    name: Build signed macOS update
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build release and updater manifest
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: app-v__VERSION__
          releaseName: "No Goals No Gain v__VERSION__"
          releaseBody: "Download the update below or install it directly from No Goals No Gain."
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          args: "--target universal-apple-darwin"

      - name: Upload stable marketing download
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          version="$(node -p 'JSON.parse(require("fs").readFileSync("src-tauri/tauri.conf.json", "utf8")).version')"
          dmg="$(find src-tauri/target -path '*/release/bundle/dmg/*.dmg' -type f -print -quit)"

          if [[ -z "$dmg" ]]; then
            echo "The macOS DMG was not generated."
            exit 1
          fi

          cp "$dmg" GoalBar-macOS.dmg
          gh release upload "app-v${version}" "GoalBar-macOS.dmg#GoalBar for macOS" --clobber
